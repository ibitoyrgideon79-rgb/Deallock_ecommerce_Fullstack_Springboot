spring:
  application:
    name: backend
  session:
    store-type: none
  devtools:
    restart:
      enabled: false
  flyway:
    enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/deallock?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:deallock}
    password: ${SPRING_DATASOURCE_PASSWORD:deallock_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 2MB
      # Allow a little overhead for multipart boundaries/fields so a 2MB file doesn't 413.
      max-request-size: 3MB

server:
  tomcat:
    max-part-count: 200
  port: 8080

app:
  base-url: http://localhost:8080
  admin-emails: ""
  contact:
    inbox: info@deallock.ng
  newsletter:
    daily-cron: "0 0 9 * * *"
    timezone: Africa/Lagos
  marketplace:
    lock-days: 7
  deals:
    # If a deal is approved but the user doesn't pay within this time, it becomes "expired unpaid"
    # and can optionally be listed on the marketplace by admins (if the user allowed listing).
    payment-timeout: 24h
    # Additional service fee rate applied per approved payment-extension week.
    extension-weekly-service-rate: 0.02

ai:
  agent:
    url: http://localhost:8000
    api-key: ${AI_AGENT_API_KEY:}

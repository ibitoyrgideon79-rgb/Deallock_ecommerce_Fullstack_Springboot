<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/frontend/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="/frontend/images/logo.jpeg">
  <title>deallock.ng</title>
</head>
<body>

 <header class="bg-white border-b border-gray-100 shadow-sm">
  <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    
    
    <div class="flex items-center gap-x-3">

      <a href="/" class="flex items-center gap-x-2">
        <img src="/frontend/images/logo.jpeg" alt="DealLock Logo" class="h-9 w-auto rounded-xl">
  
      </a>
      
      <span class="text-gray-700 text-sm font-medium hidden sm:block">
        Deal securing and purchase support.
      </span>
    </div>

    <div class="hidden md:flex items-center gap-x-2">
      <a href="/" 
         class="px-5 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-full transition-colors">
        Home
      </a>
      <a href="/marketplace" 
         class="px-5 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-full transition-colors">
        Marketplace
      </a>
      <a href="/terms" 
         class="px-5 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-full transition-colors">
        Terms
      </a>
      <a href="/contactus" 
         class="px-5 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-full transition-colors">
        Contact
      </a>
    </div>

    <div class="flex items-center gap-x-3">
      <div th:if="${currentUser == null}" class="flex items-center gap-x-2">
        <a href="/login" 
           class="px-6 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-full transition-colors">
          Login
        </a>
        <a href="/register" 
           class="px-6 py-2 text-sm font-medium bg-black text-white hover:bg-gray-800 rounded-full transition-colors">
          Register
        </a>
      </div>

      
      <div th:if="${currentUser != null}" class="relative group">
        <button onclick="toggleDropdown()" 
                class="flex items-center gap-x-2.5 px-4 py-2 hover:bg-gray-100 rounded-full transition-colors">
          <img th:src="${currentUser.profileImageUrl != null && !#strings.isEmpty(currentUser.profileImageUrl) ? currentUser.profileImageUrl : (currentUser.profileImage != null ? '/profile/image' : '/frontend/images/logo.jpeg')}" 
               alt="User Avatar" 
               class="w-8 h-8 rounded-full object-cover border border-gray-200">
          <span class="text-sm font-medium text-gray-700" th:text="${currentUser.fullName != null && !#strings.isEmpty(currentUser.fullName) ? currentUser.fullName : currentUser.email}"></span>
          <i class="fas fa-chevron-down text-xs text-gray-500"></i>
        </button>

        
        <div id="user-dropdown" 
             class="hidden group-hover:block absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 py-2 z-50">
          <a href="/profile" 
             class="block px-5 py-3 text-sm text-gray-700 hover:bg-gray-100">
            Profile Settings
          </a>
          <a href="/logout" 
             class="block px-5 py-3 text-sm text-red-600 hover:bg-gray-100">
            Log out
          </a>
        </div>
      </div>
    </div>

  
    <button id="menu-toggle" class="md:hidden text-gray-700">
      <i class="fas fa-bars text-2xl"></i>
    </button>
  </nav>
</header>


    <!-- LEFT SIDE: Navigation Sidebar -->
    <aside class="w-64 h-full bg-white flex flex-col border-r border-black">
        <div class="p-6 border-b border-black">
            <h2 class="text-[10px] font-black uppercase tracking-[0.2em]">Navigation</h2>
        </div>
        <nav class="p-4 space-y-4 overflow-y-auto no-scrollbar">
  <div>
    <a href="/dashboard" class="block w-full p-3 border border-black text-[11px] font-black uppercase hover:bg-black hover:text-white transition">
      User Dashboard
    </a>
  </div>

            <!-- Marketplace Group -->
            <div>
                <button onclick="toggleNav('market-drop')" class="w-full flex justify-between p-3 border border-black text-[11px] font-black uppercase">
                    Marketplace <i class="fas fa-plus text-[8px]"></i>
                </button>
                <div id="market-drop" class="hidden border-l border-r border-b border-black">
                    <button onclick="switchPage('Orders')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Orders</button>
                    <button onclick="switchPage('Products')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Products</button>
                </div>
            </div>
            
            <!-- Deal Flow Group -->
            <div>
                <button onclick="toggleNav('deals-drop')" class="w-full flex justify-between p-3 border border-black text-[11px] font-black uppercase">
                    Deal Flow <i class="fas fa-plus text-[8px]"></i>
                </button>
                <div id="deals-drop" class="hidden border-l border-r border-b border-black">
                    <button onclick="switchPage('Pending Approval')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Pending Approval</button>
                    <button onclick="switchPage('Payment Not Received')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Payment Not Received</button>
                    <button onclick="switchPage('Payment Confirmed')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Payment Confirmed</button>
                    <button onclick="switchPage('Secured')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Secured</button>
                    <button onclick="switchPage('Balance Pending')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Balance Pending</button>
                    <button onclick="switchPage('Delivery Initiation')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Delivery Initiation</button>
                    <button onclick="switchPage('In Transit')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">In Transit</button>
                    <button onclick="switchPage('Delivery Confirmation')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Delivery Confirmation</button>
                    <button onclick="switchPage('Concluded')" class="w-full text-left p-3 pl-8 text-[10px] font-bold uppercase hover:bg-black hover:text-white">Concluded</button>
                </div>
            </div>
        </nav>
    </aside>

    <!-- RIGHT SIDE: Main Content & Table -->
    <main class="flex-1 overflow-y-auto p-8 bg-white">
        
        <!-- Header & Filters -->
        <div class="mb-10">
            <h1 id="page-title" class="text-3xl font-black uppercase tracking-tighter italic border-b-4 border-black pb-4 mb-8 text-black">
                Marketplace: Orders
            </h1>
            
            <div class="flex flex-wrap justify-between items-end gap-6">
                <!-- Status Toggles -->
                <div class="flex border border-black">
                    <button onclick="filterStatus('all')" id="btn-all" class="px-6 py-2 text-[10px] font-black uppercase bg-black text-white">All</button>
                    <button onclick="filterStatus('active')" id="btn-active" class="px-6 py-2 text-[10px] font-black uppercase border-l border-black hover:bg-black hover:text-white transition">Active</button>
                    <button onclick="filterStatus('completed')" id="btn-completed" class="px-6 py-2 text-[10px] font-black uppercase border-l border-black hover:bg-black hover:text-white transition">Completed</button>
                </div>

                <!-- Sort & Date Filter -->
                <div class="flex gap-4 items-center">
                    <div class="flex flex-col">
                        <span class="text-[9px] font-bold uppercase mb-1">Timeframe</span>
                        <div class="flex border border-black">
                            <input type="date" id="date-from" class="p-2 text-[10px] font-bold outline-none">
                            <span class="p-2 bg-black text-white text-[10px] border-l border-r border-black">TO</span>
                            <input type="date" id="date-to" class="p-2 text-[10px] font-bold outline-none">
                        </div>
                    </div>
                    <button onclick="applyFilters()" class="bg-black text-white px-6 py-[14px] text-[10px] font-black uppercase mt-auto border border-black">Apply Filters</button>
                    <button id="btn-new-product" onclick="openNewProductModal()" style="display:none" class="bg-white text-black px-6 py-[14px] text-[10px] font-black uppercase mt-auto border border-black hover:bg-black hover:text-white transition">New Product</button>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="border border-black overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-black text-white uppercase text-[9px] tracking-widest">
                        <th class="p-4 border-r border-gray-800">S/N</th>
                        <th class="p-4 border-r border-gray-800">Item ID</th>
                        <th class="p-4 border-r border-gray-800">Name</th>
                        <th class="p-4 border-r border-gray-800">Price</th>
                        <th class="p-4 border-r border-gray-800">Status</th>
                        <th class="p-4 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-[11px] font-medium uppercase text-black">
                    <!-- Dynamic Data -->
                </tbody>
            </table>
        </div>






        <!-- NEW MARKETPLACE PRODUCT MODAL -->
        <div id="new-product-modal" class="hidden fixed inset-0 bg-black/70 items-center justify-center z-[200] p-4">
            <div class="bg-white w-full max-w-2xl max-h-[92vh] overflow-auto border border-black">
                <div class="p-6 border-b border-black flex justify-between items-center">
                    <h2 class="text-xl font-black uppercase">New Marketplace Item</h2>
                    <button onclick="closeNewProductModal()" class="text-3xl leading-none">&times;</button>
                </div>

                <div class="p-6 space-y-4">
                    <input id="mp-name" type="text" placeholder="Item Name *" class="w-full border border-black p-3 text-[12px] font-bold uppercase outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="mp-price" type="number" placeholder="Price (NGN) *" class="border border-black p-3 text-[12px] font-bold uppercase outline-none">
                        <input id="mp-old-price" type="number" placeholder="Old Price (Optional)" class="border border-black p-3 text-[12px] font-bold uppercase outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <select id="mp-size" class="border border-black p-3 text-[12px] font-bold uppercase outline-none bg-white">
                            <option value="small" selected>Small</option>
                            <option value="medium">Medium</option>
                            <option value="big">Big</option>
                        </select>
                        <input id="mp-photo" type="file" accept="image/*" class="border border-black p-3 text-[12px] font-bold uppercase outline-none bg-white">
                    </div>
                    <textarea id="mp-description" rows="4" placeholder="Description" class="w-full border border-black p-3 text-[12px] font-bold outline-none"></textarea>
                    <label class="flex items-center gap-2 text-[11px] font-black uppercase">
                        <input id="mp-listed" type="checkbox" checked>
                        List immediately
                    </label>
                </div>

                <div class="p-6 border-t border-black flex gap-3">
                    <button onclick="closeNewProductModal()" class="flex-1 border border-black py-3 text-[11px] font-black uppercase hover:bg-gray-100">Cancel</button>
                    <button onclick="submitNewProduct()" class="flex-1 bg-black text-white border border-black py-3 text-[11px] font-black uppercase hover:bg-gray-800">Create</button>
                </div>
            </div>
        </div>

</body>
<script src="/frontend/js/addashboard.js"></script>
</html>

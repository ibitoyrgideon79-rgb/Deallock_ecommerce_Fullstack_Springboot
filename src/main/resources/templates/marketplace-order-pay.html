<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/frontend/css/tailwind.css">
  <title>Marketplace Payment</title>
</head>
<body class="bg-gray-50 min-h-screen" th:attr="data-order-id=${order['id']}">
  <header class="bg-white border-b border-gray-100 shadow-sm">
    <nav class="max-w-4xl mx-auto px-5 py-4 flex items-center justify-between gap-3 flex-wrap">
      <a href="/dashboard?tab=orders" class="text-sm font-medium text-gray-700 hover:text-black">&larr; Back to My Orders</a>
      <div class="flex items-center gap-2">
        <a th:href="@{'/dashboard/order/' + ${order['id']}}" class="text-sm font-medium border border-gray-300 px-3 py-1.5 rounded-lg hover:bg-gray-50">Order Details</a>
        <a th:href="@{'/dashboard/order/' + ${order['id']} + '/track'}" class="text-sm font-medium border border-gray-300 px-3 py-1.5 rounded-lg hover:bg-gray-50">Track Order</a>
      </div>
    </nav>
  </header>

  <main class="max-w-4xl mx-auto px-5 py-8">
    <section class="bg-white border border-gray-200 rounded-2xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-semibold">Pay For Order</h1>
        <span id="status-badge" class="px-3 py-1 text-xs rounded-full bg-gray-100 text-gray-700" th:text="${order['status']}">PENDING_PAYMENT</span>
      </div>

      <div class="mb-4 text-sm text-gray-600">
        Order <span class="font-semibold" th:text="${order['orderCode']}">MO-0</span>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5 text-sm">
        <div class="border border-gray-200 rounded-xl p-4">
          <div class="font-semibold mb-2">Transfer To</div>
          <div class="space-y-1 text-gray-700">
            <div>Account Name: <strong>Deallock</strong></div>
            <div>Bank: <strong>Fidelity Bank</strong></div>
            <div>Account Number: <strong>5601682913</strong></div>
          </div>
        </div>
        <div class="border border-gray-200 rounded-xl p-4">
          <div class="font-semibold mb-2">Amount</div>
          <div class="text-gray-700 text-sm">
            Total: <strong>&#8358; <span th:text="${order['totalAmount']}">0</span></strong>
          </div>
          <div class="text-xs text-gray-500 mt-2">After transfer, upload payment proof below for admin confirmation.</div>
        </div>
      </div>

      <form id="payment-proof-form" class="space-y-3">
        <input type="file" id="payment-proof-file" accept="image/*,.pdf" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm" required>
        <textarea id="payment-proof-note" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm" rows="3" placeholder="Optional payment note"></textarea>
        <button type="submit" id="upload-proof-btn" class="w-full bg-black text-white py-2.5 rounded-xl text-sm font-medium">Upload Proof Of Payment</button>
      </form>

      <a id="view-proof-link" href="#" target="_blank" rel="noopener" class="hidden mt-3 inline-block text-sm text-blue-600 hover:underline">View Uploaded Payment Proof</a>
      <div id="order-admin-note" class="hidden mt-4 p-3 rounded-xl bg-yellow-50 border border-yellow-200 text-sm text-yellow-900"></div>
    </section>
  </main>

  <script th:inline="javascript">
    window.__ORDER_ID__ = /*[[${order['id']}]]*/ 0;
  </script>
  <script src="/frontend/js/marketplace-order-pay.js" defer></script>
</body>
</html>

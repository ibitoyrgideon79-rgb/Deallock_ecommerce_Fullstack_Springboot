<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="/frontend/style.css"><title>Error - DealLock</title><style>body{background:#0f1b2b;color:#f8fafc;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}.error-card{max-width:520px;width:100%;background:#122338;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px;text-align:center}.error-code{font-size:2.4rem;font-weight:700;margin-bottom:8px}.error-message{color:#b6c2d6;margin-bottom:20px}.error-actions a{display:inline-block;padding:10px 18px;border-radius:8px;text-decoration:none;background:#22c55e;color:#0a1220;font-weight:600}</style></head><body><div class="error-card"><div class="error-code" id="code">Error</div><div class="error-message" id="msg">Something went wrong. Please try again.</div><div class="error-actions"><a href="/login">Go to Login</a></div></div><script>const q=new URLSearchParams(location.search); if(q.get('status')) document.getElementById('code').textContent='Error '+q.get('status'); if(q.get('message')) document.getElementById('msg').textContent=q.get('message');</script></body></html>

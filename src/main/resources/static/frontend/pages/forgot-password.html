<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="/frontend/login.css"><link rel="stylesheet" href="/frontend/style.css"><title>Forgot Password</title></head><body><div class="login-page"><div class="login-container"><h2 class="login-title">Forgot Password</h2><form method="post" action="/forgot-password"><div class="login-form-group"><label class="login-label" for="email">Email</label><input class="login-input" type="email" id="email" name="email" required></div><button class="login-btn" type="submit">Send Reset Link</button></form><p id="msg"></p></div></div><script>const m=new URLSearchParams(location.search).get('message'); if(m) document.getElementById('msg').textContent=m;</script></body></html>

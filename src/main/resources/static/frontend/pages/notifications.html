<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/frontend/style.css">
  <link rel="stylesheet" href="/frontend/dashboard.css">
  <title>Notifications - DealLock</title>
  <style>
    body { background:#0f1b2b; color:#f8fafc; }
    .notification-card { background:#122338; border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:14px 16px; margin-bottom:12px; }
    .notification-time { color:#b6c2d6; font-size:.85rem; margin-top:6px; }
    .notification-empty { color:#b6c2d6; padding:12px 0; }
  </style>
</head>
<body>
  <header><nav class="navbar"><div class="logo-wrapper"><a href="/" class="logo"><img src="/frontend/logo.jpeg" alt="DealLock Logo"></a><span class="slogan">Notifications</span></div><ul class="nav-links"><li><a href="/dashboard">Dashboard</a></li><li><a href="/logout">Log out</a></li></ul></nav></header>
  <main class="dashboard-container" style="padding:24px;"><section style="width:100%;max-width:900px;margin:0 auto;"><h2 style="margin-bottom:16px;">Your Notifications</h2><div id="notifications-list" class="notification-empty">Loading notifications...</div></section></main>
  <script>
    (async function(){
      const el = document.getElementById('notifications-list');
      try {
        const res = await fetch('/api/notifications?limit=100', { credentials:'include' });
        if (!res.ok) { el.textContent = 'Unable to load notifications.'; return; }
        const list = await res.json();
        if (!Array.isArray(list) || list.length === 0) { el.textContent = 'No notifications yet.'; return; }
        el.className = '';
        el.innerHTML = list.map(n => `<div class="notification-card"><div>${(n.message||'').replace(/[<>&]/g, s => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[s]))}</div><div class="notification-time">${n.createdAt ? new Date(n.createdAt).toLocaleString() : ''}</div></div>`).join('');
      } catch(e) {
        el.textContent = 'Unable to load notifications.';
      }
    })();
  </script>
</body>
</html>

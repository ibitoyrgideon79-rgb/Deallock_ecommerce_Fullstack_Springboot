version: "2.2"

services:
  db:
    image: mysql:8.4
    container_name: deallock-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-deallock}
      MYSQL_USER: ${MYSQL_USER:-deallock}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deallock_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deallock-app
    restart: unless-stopped
    depends_on:
      - db
      - ai-agent
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-deallock}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: ${MYSQL_USER:-deallock}
      DB_PASS: ${MYSQL_PASSWORD:-deallock_pass}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      TERMII_API_KEY: ${TERMII_API_KEY:-}
      TERMII_SENDER_ID: ${TERMII_SENDER_ID:-}
      TERMII_SMS_CHANNEL: ${TERMII_SMS_CHANNEL:-dnd}
      TERMII_WHATSAPP_SENDER: ${TERMII_WHATSAPP_SENDER:-}
      TERMII_BASE_URL: ${TERMII_BASE_URL:-https://api.ng.termii.com/api}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      APP_ADMIN_PHONES: ${APP_ADMIN_PHONES:-}
      AI_AGENT_URL: ${AI_AGENT_URL:-http://ai-agent:8000}
      AI_AGENT_API_KEY: ${AI_AGENT_API_KEY:-}
    ports:
      - "8080:8080"

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    container_name: deallock-ai-agent
    restart: unless-stopped
    environment:
      AI_AGENT_API_KEY: ${AI_AGENT_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "8000:8000"

volumes:
  db_data:

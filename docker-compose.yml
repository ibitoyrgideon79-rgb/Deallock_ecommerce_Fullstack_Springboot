version: "2.2"

services:
  db:
    image: mysql:8.0.35
    container_name: deallock-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-}
      MYSQL_USER: ${MYSQL_USER:-}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deallock-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-deallock}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-}
      DB_USER: ${MYSQL_USER:-deallock}
      DB_PASS: ${MYSQL_PASSWORD:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      TERMII_API_KEY: ${TERMII_API_KEY:-}
      TERMII_SENDER_ID: ${TERMII_SENDER_ID:-}
      TERMII_SMS_CHANNEL: ${TERMII_SMS_CHANNEL:-dnd}
      TERMII_WHATSAPP_SENDER: ${TERMII_WHATSAPP_SENDER:-}
      TERMII_BASE_URL: ${TERMII_BASE_URL:-https://api.ng.termii.com/api}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      APP_ADMIN_PHONES: ${APP_ADMIN_PHONES:-}
      AI_AGENT_URL: ${AI_AGENT_URL:-http://ai-agent:8000}
      AI_AGENT_API_KEY: ${AI_AGENT_API_KEY:-}
    ports:
      - "8080:8080"

  # ai-agent:
  #   build:
  #     context: ./ai-agent
  #     dockerfile: Dockerfile
  #   container_name: deallock-ai-agent
